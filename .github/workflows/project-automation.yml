name: Project Automation

on:
  pull_request:
    types: [opened, reopened]
  create: # trigger cuando se crea un branch

jobs:
  move-to-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Move PR to En review
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_TOKEN }}
          script: |
            const script = require('./.github/scripts/move-to-review.js')
            await script({ github, context })

  move-to-dev:
    if: github.event_name == 'create' && github.ref_type == 'branch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Move issue to En desarrollo
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_TOKEN }}
          script: |
            const script = require('./.github/scripts/move-to-dev.js')
            await script({ github, context })
